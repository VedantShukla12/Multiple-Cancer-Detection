<!DOCTYPE html>
<html>
<head>
    <title>Medical Model Selector</title>
</head>
<body>
    <h1>Select a Model</h1>
    <form action="/redirect" method="POST">
        <select name="model">
            <option value="lung">Lung Model</option>
            <option value="breast">Breast Model</option>
            <option value="prostate">Prostate Model</option>
        </select>
        <button type="submit">Go</button>
    </form>
</body>
</html>
